<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily and Random Bible Verse</title>
    <!-- Link to your external stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <!-- Left Column: Random Verse -->
        <div class="column">
            <h2>Verse of the Hour</h2>
            <div id="random-verse-container">
                <p class="loading">Loading random verse...</p>
            </div>
        </div>

        <!-- Right Column: Daily Reading -->
        <div class="column">
            <h2 id="daily-reading-title">Today's Reading</h2>
            <div id="daily-reading-text">
                <p class="loading">Loading reading plan...</p>
            </div>
        </div>
    </div>

    <!-- Link to your external JavaScript file -->
    <!-- 'defer' ensures the script runs after the HTML is parsed -->
    <script src="script.js" defer></script>

</body>
</html>
