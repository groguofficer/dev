<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Bible & Devotional</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style1.css">
</head>
<body>

    <header class="site-header">
        <div class="header-inner">
            <span class="header-ornament">✦</span>
            <h1>Daily Bread</h1>
            <p class="header-sub">Scripture &amp; Devotional for the Faithful Soul</p>
            <span class="header-ornament">✦</span>
        </div>
    </header>

    <div class="container">

        <!-- Left Column -->
        <div class="column left-column">

            <!-- Section 1: Random Verse -->
            <section class="card verse-card">
                <div class="card-label">Verse of the Hour</div>
                <div id="random-verse-container">
                    <p>Loading verse…</p>
                </div>
                <!-- onclick uses window.refreshVerse, set in script1.js before defer runs -->
                <button class="refresh-btn" onclick="window.refreshVerse && window.refreshVerse()" title="New verse">↻</button>
            </section>

            <!-- Section 2: Spurgeon Morning & Evening -->
            <section class="card spurgeon-card">
                <div class="card-label">Spurgeon · Morning &amp; Evening</div>
                <div id="spurgeon-date-label" class="spurgeon-date"></div>
                <div id="spurgeon-container">
                    <p>Loading devotional…</p>
                </div>
            </section>

        </div>

        <!-- Right Column: Daily Reading -->
        <div class="column right-column">
            <section class="card reading-card">
                <div class="card-label" id="daily-reading-title">Today's Reading</div>
                <div id="daily-reading-text">
                    <p>Loading reading plan…</p>
                </div>
            </section>
        </div>

    </div>

    <footer class="site-footer">
        <p>"Thy word is a lamp unto my feet, and a light unto my path." — Psalm 119:105</p>
    </footer>

    <script src="script1.js" defer></script>

</body>
</html>
