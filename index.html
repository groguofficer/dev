<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Digital Scribe's Desk</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>The Digital Scribe's Desk</h1>
    </header>

    <main class="container">
        <!-- LEFT COLUMN -->
        <section class="column left-column">
            <div class="card">
                <h2>Verse of the Hour</h2>
                <div id="hourly-verse-container">
                    <p>Loading verse...</p>
                </div>
            </div>

            <div class="card">
                <h2>Today's Reading (Bible in One Year)</h2>
                <div id="bioy-container">
                    <!-- Reading schedule will be injected here by JavaScript -->
                </div>
            </div>
        </section>

        <!-- RIGHT COLUMN -->
        <aside class="column right-column">
            <div class="card">
                <h2>Verse Finder</h2>
                <p>Enter a theme, keyword, or question to find relevant verses.</p>
                <div class="search-form">
                    <input type="text" id="search-input" placeholder="e.g., 'faith', 'love', 'forgiveness'">
                    <button id="search-button">Enter</button>
                </div>
                <div id="search-results-container">
                    <!-- Search results will be injected here by JavaScript -->
                </div>
            </div>
        </aside>
    </main>

    <script src="script.js"></script>
</body>
</html>
